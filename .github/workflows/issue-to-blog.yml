name: Issue To Blog Post

on:
  issues:
    types: [opened, edited, reopened, labeled]

jobs:
  create-blog-post:
    if: >-
      contains(join(github.event.issue.labels.*.name, ','), 'blog-from-issue') ||
      startsWith(github.event.issue.title, '[Blog]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create blog markdown from issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const issue = context.payload.issue
            const rawTitle = issue.title || `Issue ${issue.number}`
            const cleanTitle = rawTitle.replace(/^\[Blog\]\s*/i, '').trim() || `Issue ${issue.number}`
            const issueBody = (issue.body || '').trim()
            const now = new Date().toISOString()

            const slugify = (value) => value
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .trim()
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')

            let slug = slugify(cleanTitle)
            if (!slug) slug = `issue-${issue.number}`

            const blogDir = path.join(process.env.GITHUB_WORKSPACE, 'content', 'blog')
            let filePath = path.join(blogDir, `${slug}.md`)

            if (fs.existsSync(filePath)) {
              filePath = path.join(blogDir, `${slug}-${issue.number}.md`)
            }

            const excerpt = issueBody
              ? issueBody.replace(/\s+/g, ' ').slice(0, 180)
              : `Blog post generated from GitHub issue #${issue.number}.`

            const sourceLink = issue.html_url

            const content = `---
title: "${cleanTitle.replace(/"/g, '\\"')}"
date: "${now}"
description: "${excerpt.replace(/"/g, '\\"')}"
keywords:
  - github issue
  - blog automation
  - xagi labs
author: "xAGI Labs"
category: "Automation"
canonical: "https://xagi.in/blog/${path.basename(filePath, '.md')}"
---

# ${cleanTitle}

This post was generated from GitHub issue [#${issue.number}](${sourceLink}).

## Source Context

- Issue: ${sourceLink}
- Created by: @${issue.user?.login || 'unknown'}

## Draft Notes

${issueBody || 'No body content was provided in the issue.'}
`

            fs.writeFileSync(filePath, content, 'utf8')
            core.setOutput('file_path', path.relative(process.env.GITHUB_WORKSPACE, filePath))

      - name: Commit and push blog post
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/blog
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: create blog post from issue #${{ github.event.issue.number }} [skip ci]"
            git push
          fi
